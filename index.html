  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

t:400;\">{{ projSubtitle }}<\u002Fdiv>\n    <div style=\"width:100%;height:400px;background:#101010;margin-bottom:56px;display:flex;align-items:center;justify-content:center;border:1px solid #1a1a1a;\">\n      <span style=\"font-size:11px;letter-spacing:3px;color:#222;font-family:monospace;\">PROJECT PREVIEW<\u002Fspan>\n    <\u002Fdiv>\n    <p style=\"font-size:17px;line-height:1.88;color:#585858;margin:0 0 56px;max-width:680px;\">{{ projDesc }}<\u002Fp>\n    <div style=\"display:flex;align-items:center;gap:48px;padding-top:40px;border-top:1px solid #181818;flex-wrap:wrap;\">\n      <div>\n        <div style=\"font-size:10px;letter-spacing:2.5px;color:#2c2c2c;margin-bottom:8px;\">PLATFORM<\u002Fdiv>\n        <div style=\"font-size:14px;color:#585858;\">{{ projPlatforms }}<\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <div style=\"font-size:10px;letter-spacing:2.5px;color:#2c2c2c;margin-bottom:8px;\">YEAR<\u002Fdiv>\n        <div style=\"font-size:14px;color:#585858;\">{{ projYear }}<\u002Fdiv>\n      <\u002Fdiv>\n      <sc-if value=\"{{ projHasLink }}\" hint-placeholder-val=\"{{ true }}\">\n        <a href=\"{{ projLink }}\" target=\"_blank\" style=\"margin-left:auto;padding:16px 32px;border:1px solid rgba(91,95,255,0.5);color:#5B5FFF;font-size:12px;letter-spacing:2px;transition:all 0.3s;display:inline-block;\" style-hover=\"background:#5B5FFF;color:#fff;border-color:#5B5FFF;\">VIEW ON BEHANCE ↗<\u002Fa>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ─── CONTACT MODAL ─── -->\n<div style=\"{{ contactModalStyle }}\">\n  <div style=\"background:#0d0d0d;border:1px solid #1a1a1a;padding:64px;width:min(600px,90vw);position:relative;\">\n    <button onclick=\"{{ closeModal }}\" style=\"position:absolute;top:24px;right:24px;background:transparent;border:1px solid #222;color:#888;width:36px;height:36px;border-radius:50%;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all 0.2s;\" style-hover=\"border-color:#5B5FFF;color:#f0f0f0;\">✕<\u002Fbutton>\n    <sc-if value=\"{{ formSent }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"text-align:center;padding:40px 0;\">\n        <div style=\"width:56px;height:56px;border-radius:50%;background:rgba(91,95,255,0.12);border:1px solid rgba(91,95,255,0.4);display:flex;align-items:center;justify-content:center;margin:0 auto 28px;font-size:22px;color:#5B5FFF;\">✓<\u002Fdiv>\n        <h2 style=\"font-family:'Anton','Arial Black',sans-serif;font-size:32px;font-weight:600;color:#f0f0f0;margin:0 0 12px;letter-spacing:-1px;\">Message Sent!<\u002Fh2>\n        <p style=\"font-size:15px;color:#484848;margin:0;\">I'll get back to you shortly.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n    <sc-if value=\"{{ formNotSent }}\" hint-placeholder-val=\"{{ true }}\">\n      <div>\n        <div style=\"font-size:10px;letter-spacing:3px;color:#5B5FFF;margin-bottom:12px;\">CONTACT<\u002Fdiv>\n        <h2 style=\"font-family:'Anton','Arial Black',sans-serif;font-size:38px;font-weight:600;color:#f0f0f0;margin:0 0 40px;letter-spacing:-1px;\">Get in touch<\u002Fh2>\n        <form onsubmit=\"{{ handleFormSubmit }}\" style=\"display:flex;flex-direction:column;gap:14px;\">\n          <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:14px;\">\n            <input type=\"text\" placeholder=\"Your name\" value=\"{{ formName }}\" onchange=\"{{ handleNameChange }}\" required=\"\" style=\"background:#0a0a0a;border:1px solid #1e1e1e;color:#f0f0f0;padding:14px 16px;font-size:14px;width:100%;font-family:'Inter',sans-serif;\">\n            <input type=\"email\" placeholder=\"Email address\" value=\"{{ formEmail }}\" onchange=\"{{ handleEmailChange }}\" required=\"\" style=\"background:#0a0a0a;border:1px solid #1e1e1e;color:#f0f0f0;padding:14px 16px;font-size:14px;width:100%;font-family:'Inter',sans-serif;\">\n          <\u002Fdiv>\n          <textarea placeholder=\"Tell me about your project...\" value=\"{{ formMessage }}\" onchange=\"{{ handleMessageChange }}\" rows=\"5\" required=\"\" style=\"background:#0a0a0a;border:1px solid #1e1e1e;color:#f0f0f0;padding:14px 16px;font-size:14px;resize:none;font-family:'Inter',sans-serif;\"><\u002Ftextarea>\n          <button type=\"submit\" style=\"background:#5B5FFF;border:none;color:#fff;padding:17px;font-size:13px;font-weight:500;letter-spacing:2px;transition:all 0.2s;\" style-hover=\"background:#4a4eff;box-shadow:0 0 30px rgba(91,95,255,0.35);\">SEND MESSAGE<\u002Fbutton>\n        <\u002Fform>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1440,&quot;height&quot;:900}}\">\n\nclass Component extends DCLogic {\n  state = {\n    modalType: null,\n    activeProject: 0,\n    formName: '',\n    formEmail: '',\n    formMessage: '',\n    formSent: false\n  };\n\n  projects = [\n    {\n      idx: 0,\n      category: 'MOBILE APP',\n      title: 'Look Book',\n      subtitle: 'Beauty Booking Services app',\n      platforms: 'iOS · Android',\n      year: '2024',\n      desc: 'A comprehensive beauty booking mobile application designed for seamless service discovery, booking, and management. Built on real user research, competitive benchmarking, and iterative usability testing — the result is an intuitive flow that serves both clients and service providers across iOS and Android.',\n      link: 'https://www.behance.net/gallery/242571623/Booking-Beauty-Services-Mobile-App'\n    },\n    {\n      idx: 1,\n      category: 'WEB PLATFORM',\n      title: 'Skill Path',\n      subtitle: 'Mentorship platform',\n      platforms: 'Web',\n      year: '2024',\n      desc: 'A mentorship platform connecting learners with industry experts. Designed the end-to-end experience: from onboarding and mentor discovery, to session booking and progress tracking. Focused on clarity, trust signals, and long-term user engagement through a research-driven design process.',\n      link: 'https://www.behance.net/gallery/244388033/Skill-Path-mentorship-platform'\n    },\n    {\n      idx: 2,\n      category: 'OTHER',\n      title: 'Different Works',\n      subtitle: 'Banners, Dashboards, etc',\n      platforms: 'Web · Mobile',\n      year: '2023–2024',\n      desc: 'A collection of varied design work spanning dashboard interfaces, marketing banners, and branded digital assets. Demonstrates range across visual design, data visualisation, and cross-platform responsive layouts — reflecting both craft and systematic thinking.',\n      link: null\n    }\n  ];\n\n  skills = [\n    'User Research','In-depth Interviews','Competitor Analysis','Heuristic Analysis',\n    'User Flows','Information Architecture','Customer Journey Maps','Prototyping',\n    'Usability Testing','Design Thinking','Double Diamond','Web Design',\n    'Mobile Design','3D Animation','Motion Design','HTML & CSS'\n  ];\n\n  reviewsBase = [\n    { quote: 'Hanna brought clarity to our product where we had chaos. Her research-driven approach helped us ship something users actually love.', name: 'Alex Morrison', role: 'CEO, TechStart' },\n    { quote: 'Working with Hanna felt like having a strategic partner. She asked the right questions and consistently delivered beyond expectations.', name: 'Maria Kovalenko', role: 'Product Manager, Fintech Co' },\n    { quote: 'Her 3D animation background gives her a unique eye for motion and depth. The prototypes she delivered felt polished and production-ready.', name: 'James Park', role: 'Founder, Creative Studio' },\n    { quote: 'Hanna deeply understands users. Her usability testing caught critical issues before launch — that kind of rigour is invaluable.', name: 'Sophie Müller', role: 'Head of Design, Scale-up' }\n  ];\n\n  componentDidMount() {\n    this._mounted = true;\n    this._loadThree();\n    this.initCursor();\n    this.initNavScroll();\n    this.initReveal();\n    this.initCardInteractions();\n    document.addEventListener('keydown', (e) => {\n      if (e.key === 'Escape' && this.state.modalType) this.closeModal();\n    });\n  }\n\n  componentWillUnmount() {\n    this._mounted = false;\n    if (this._cleanupThree) this._cleanupThree();\n  }\n\n  _loadThree() {\n    if (typeof THREE !== 'undefined') {\n      this.initThreeJS();\n      return;\n    }\n    // Avoid double-injecting\n    if (document.querySelector('script[data-hz-three]')) {\n      let n = 0;\n      const id = setInterval(() => {\n        n++;\n        if (typeof THREE !== 'undefined') { clearInterval(id); if (this._mounted) this.initThreeJS(); }\n        else if (n > 40) clearInterval(id);\n      }, 150);\n      return;\n    }\n    const s = document.createElement('script');\n    s.src = (window.__resources && window.__resources.threeJs) || 'https://cdn.jsdelivr.net/npm/three@0.155.0/build/three.min.js';\n    s.setAttribute('data-hz-three', '1');\n    s.onload = () => { if (this._mounted) this.initThreeJS(); };\n    s.onerror = () => console.warn('Three.js failed to load — hero scene skipped.');\n    document.head.appendChild(s);\n  }\n\n  initThreeJS() {\n    const container = document.getElementById('hero-canvas-wrap');\n    if (!container) return;\n    const size = container.offsetWidth || 440;\n\n    const scene = new THREE.Scene();\n    const camera = new THREE.PerspectiveCamera(55, 1, 0.1, 100);\n    camera.position.z = 2.9;\n\n    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });\n    renderer.setSize(size, size);\n    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));\n    renderer.setClearColor(0x000000, 0);\n    Object.assign(renderer.domElement.style, {\n      position: 'absolute', top: '0', left: '0', width: '100%', height: '100%', display: 'block'\n    });\n    container.appendChild(renderer.domElement);\n\n    // Morphing blob\n    const geo = new THREE.SphereGeometry(1.0, 32, 32);\n    const posAttr = geo.attributes.position;\n    const origPos = new Float32Array(posAttr.array);\n    const mat = new THREE.MeshPhongMaterial({ color: 0x12122a, emissive: 0x07071a, specular: 0x5B5FFF, shininess: 80 });\n    const mesh = new THREE.Mesh(geo, mat);\n    scene.add(mesh);\n\n    // Wireframe cage\n    const wireGeo = new THREE.IcosahedronGeometry(1.38, 1);\n    const wireMat = new THREE.MeshBasicMaterial({ color: 0x5B5FFF, wireframe: true, transparent: true, opacity: 0.1 });\n    const wireMesh = new THREE.Mesh(wireGeo, wireMat);\n    scene.add(wireMesh);\n\n    // Fibonacci sphere particles\n    const pCount = 60, pPos = new Float32Array(pCount * 3);\n    const ga = Math.PI * (3 - Math.sqrt(5));\n    for (let i = 0; i < pCount; i++) {\n      const y = 1 - (i / (pCount - 1)) * 2;\n      const r = Math.sqrt(1 - y * y);\n      const t = ga * i;\n      pPos[i*3] = Math.cos(t) * r * 1.72;\n      pPos[i*3+1] = y * 1.72;\n      pPos[i*3+2] = Math.sin(t) * r * 1.72;\n    }\n    const pGeo = new THREE.BufferGeometry();\n    pGeo.setAttribute('position', new THREE.BufferAttribute(pPos, 3));\n    const pts = new THREE.Points(pGeo, new THREE.PointsMaterial({ color: 0x5B5FFF, size: 0.032, transparent: true, opacity: 0.6 }));\n    scene.add(pts);\n\n    // Lights\n    scene.add(new THREE.AmbientLight(0x0a0a22, 4));\n    const l1 = new THREE.PointLight(0x5B5FFF, 12, 8);\n    l1.position.set(2, 1.5, 2);\n    scene.add(l1);\n    const l2 = new THREE.PointLight(0xa0a0ff, 5, 6);\n    l2.position.set(-1.5, -1, 2);\n    scene.add(l2);\n\n    let mx = 0, my = 0;\n    const onMove = (e) => {\n      mx = (e.clientX / window.innerWidth - 0.5) * 2;\n      my = (e.clientY / window.innerHeight - 0.5) * 2;\n    };\n    window.addEventListener('mousemove', onMove);\n    this._cleanupThree = () => { window.removeEventListener('mousemove', onMove); renderer.dispose(); };\n\n    const clock = new THREE.Clock();\n    const animate = () => {\n      if (!this._mounted) return;\n      requestAnimationFrame(animate);\n      const t = clock.getElapsedTime();\n      for (let i = 0; i < posAttr.count; i++) {\n        const ox = origPos[i*3], oy = origPos[i*3+1], oz = origPos[i*3+2];\n        const len = Math.sqrt(ox*ox + oy*oy + oz*oz) || 1;\n        const d = Math.sin(ox*3 + t*0.9) * Math.cos(oy*3 + t*0.7) * Math.sin(oz*3 + t*0.8) * 0.13;\n        posAttr.setXYZ(i, ox + (ox/len)*d, oy + (oy/len)*d, oz + (oz/len)*d);\n      }\n      posAttr.needsUpdate = true;\n      geo.computeVertexNormals();\n      mesh.rotation.y = t * 0.25 + mx * 0.4;\n      mesh.rotation.x += (my * 0.25 - mesh.rotation.x) * 0.05;\n      wireMesh.rotation.y = -t * 0.12;\n      wireMesh.rotation.x = t * 0.08;\n      pts.rotation.y = t * 0.15;\n      l1.position.x = Math.cos(t * 0.6) * 2.5;\n      l1.position.z = Math.sin(t * 0.6) * 2.5;\n      renderer.render(scene, camera);\n    };\n    animate();\n  }\n\n  initCursor() {\n    if ('ontouchstart' in window) {\n      document.body.style.cursor = 'auto';\n      ['hz-ring','hz-dot'].forEach(id => {\n        const el = document.getElementById(id);\n        if (el) el.style.display = 'none';\n      });\n      return;\n    }\n    const ring = document.getElementById('hz-ring');\n    const dot = document.getElementById('hz-dot');\n    if (!ring || !dot) return;\n    let tx = -100, ty = -100, rx = -100, ry = -100;\n    const lerp = (a, b, t) => a + (b - a) * t;\n    document.addEventListener('mousemove', (e) => {\n      tx = e.clientX; ty = e.clientY;\n      dot.style.left = tx + 'px';\n      dot.style.top = ty + 'px';\n    });\n    document.addEventListener('mouseover', (e) => {\n      const hit = e.target.closest('a, button, [data-project-idx]');\n      ring.style.transform = hit ? 'translate(-50%,-50%) scale(2.2)' : 'translate(-50%,-50%) scale(1)';\n      ring.style.borderColor = hit ? '#5B5FFF' : 'rgba(255,255,255,0.3)';\n    });\n    const loop = () => {\n      if (!this._mounted) return;\n      rx = lerp(rx, tx, 0.1); ry = lerp(ry, ty, 0.1);\n      ring.style.left = rx + 'px'; ring.style.top = ry + 'px';\n      requestAnimationFrame(loop);\n    };\n    loop();\n  }\n\n  initNavScroll() {\n    const nav = document.getElementById('hz-nav');\n    if (!nav) return;\n    window.addEventListener('scroll', () => {\n      if (window.scrollY > 60) {\n        Object.assign(nav.style, { background: 'rgba(10,10,10,0.92)', backdropFilter: 'blur(20px)', padding: '16px 48px', borderBottom: '1px solid rgba(255,255,255,0.04)' });\n      } else {\n        Object.assign(nav.style, { background: 'transparent', backdropFilter: 'none', padding: '28px 48px', borderBottom: 'none' });\n      }\n    }, { passive: true });\n  }\n\n  initReveal() {\n    const els = document.querySelectorAll('[data-reveal]');\n    els.forEach(el => Object.assign(el.style, { opacity: '0', transform: 'translateY(28px)', transition: 'opacity 0.9s ease, transform 0.9s ease' }));\n    const obs = new IntersectionObserver((entries) => {\n      entries.forEach(e => {\n        if (e.isIntersecting) {\n          Object.assign(e.target.style, { opacity: '1', transform: 'translateY(0)' });\n          obs.unobserve(e.target);\n        }\n      });\n    }, { threshold: 0.08, rootMargin: '0px 0px -20px 0px' });\n    els.forEach(el => obs.observe(el));\n  }\n\n  initCardInteractions() {\n    document.addEventListener('click', (e) => {\n      const card = e.target.closest('[data-project-idx]');\n      if (card) this.openProject(parseInt(card.getAttribute('data-project-idx'), 10));\n    });\n    document.addEventListener('mouseover', (e) => {\n      const card = e.target.closest('[data-project-idx]');\n      if (card) { card.style.borderColor = '#5B5FFF'; card.style.transform = 'translateY(-4px)'; }\n    });\n    document.addEventListener('mouseout', (e) => {\n      const card = e.target.closest('[data-project-idx]');\n      if (card && !card.contains(e.relatedTarget)) { card.style.borderColor = '#1c1c1c'; card.style.transform = 'translateY(0)'; }\n    });\n  }\n\n  openProject(idx) { this.setState({ modalType: 'project', activeProject: idx }); document.body.style.overflow = 'hidden'; }\n  openContact() { this.setState({ modalType: 'contact', formSent: false, formName: '', formEmail: '', formMessage: '' }); document.body.style.overflow = 'hidden'; }\n  closeModal() { this.setState({ modalType: null }); document.body.style.overflow = ''; }\n\n  handleFormSubmit(e) {\n    e.preventDefault();\n    this.setState({ formSent: true });\n    setTimeout(() => { this.setState({ modalType: null }); document.body.style.overflow = ''; }, 2800);\n  }\n\n  renderVals() {\n    const { modalType, activeProject, formName, formEmail, formMessage, formSent } = this.state;\n    const proj = this.projects[activeProject] || this.projects[0];\n    const baseModal = { position: 'fixed', top: 0, right: 0, bottom: 0, left: 0, zIndex: 1000, transition: 'opacity 0.38s ease', overflowY: 'auto' };\n    return {\n      projectModalStyle: { ...baseModal, background: 'rgba(7,7,10,0.98)', opacity: modalType === 'project' ? 1 : 0, pointerEvents: modalType === 'project' ? 'all' : 'none', padding: '0 48px' },\n      contactModalStyle: { ...baseModal, background: 'rgba(7,7,10,0.97)', opacity: modalType === 'contact' ? 1 : 0, pointerEvents: modalType === 'contact' ? 'all' : 'none', display: 'flex', alignItems: 'center', justifyContent: 'center' },\n      projCategory: proj.category,\n      projTitle: proj.title,\n      projSubtitle: proj.subtitle,\n      projDesc: proj.desc,\n      projPlatforms: proj.platforms,\n      projYear: proj.year,\n      projLink: proj.link || '#',\n      projHasLink: !!proj.link,\n      formName, formEmail, formMessage, formSent,\n      formNotSent: !formSent,\n      projectCards: this.projects,\n      skills: this.skills,\n      allReviews: [...this.reviewsBase, ...this.reviewsBase],\n      openContact: () => this.openContact(),\n      closeModal: () => this.closeModal(),\n      handleNameChange: (e) => this.setState({ formName: e.target.value }),\n      handleEmailChange: (e) => this.setState({ formEmail: e.target.value }),\n      handleMessageChange: (e) => this.setState({ formMessage: e.target.value }),\n      handleFormSubmit: (e) => this.handleFormSubmit(e),\n      pauseReviews: () => { const t = document.getElementById('reviews-track'); if (t) t.style.animationPlayState = 'paused'; },\n      resumeReviews: () => { const t = document.getElementById('reviews-track'); if (t) t.style.animationPlayState = 'running'; }\n    };\n  }\n}\n\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
